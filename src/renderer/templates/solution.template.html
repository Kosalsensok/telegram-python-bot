<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <!-- Google Fonts: Inter & Noto Sans Khmer -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --primary-color: #2563eb;
      --primary-gradient: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent-light: #eff6ff;
      --box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1200px;
      margin: 0 auto;
      background-color: var(--bg-color);
      font-family: 'Noto Sans Khmer', 'Inter', -apple-system, sans-serif;
      color: var(--text-dark);
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .solution-card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--box-shadow);
      border: 1px solid var(--border-color);
      padding: 48px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* HEADER SECTION */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: var(--primary-gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .brand-text h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
    }

    .brand-text p {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .badge {
      background-color: var(--accent-light);
      color: var(--primary-color);
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(37, 99, 235, 0.2);
    }

    /* QUESTION SECTION */
    .question-block {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
      background: #fafafa;
      border-radius: 16px;
      border: 1px solid #f1f5f9;
    }

    .question-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .math-display {
      font-size: 22px;
      padding: 16px 0;
      overflow-x: auto;
    }

    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 10px;
    }

    .step-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 16px;
      border-left: 3px solid var(--primary-color);
    }

    .step-explanation {
      font-size: 16px;
      color: #334155;
      font-weight: 500;
    }

    .final-answer-box {
      margin-top: 16px;
      background: var(--accent-light);
      border: 2px solid var(--primary-color);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .final-answer-box .label {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    /* FOOTER SECTION */
    .footer {
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .disclaimer {
      font-size: 12px;
      color: #94a3b8;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="solution-card" id="solution-card">
  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="logo">∑</div>
      <div class="brand-text">
        <h1>{{BOT_NAME}}</h1>
        <p>AI Math Solution Card</p>
      </div>
    </div>
    <div class="badge">{{SUBJECT}}</div>
  </div>

  <!-- CONTENT QUESTIONS -->
  {{QUESTIONS_CONTENT}}

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-left">
      <span>⚡ Generated by Smart AI Assistant</span> • 
      <span>{{BOT_USERNAME}}</span>
    </div>
    <div class="footer-right">
      <span class="disclaimer">{{GENERATED_AT}} • Verify academic results</span>
    </div>
  </div>
</div>

<script>
  function markReady() {
    window.__RENDER_READY__ = true;
  }
  if (document.readyState === 'complete') {
    markReady();
  } else {
    window.addEventListener('load', () => {
      if (document.fonts) {
        document.fonts.ready.then(markReady).catch(markReady);
      } else {
        markReady();
      }
    });
    setTimeout(markReady, 3000);
  }
</script>
</body>
</html>
