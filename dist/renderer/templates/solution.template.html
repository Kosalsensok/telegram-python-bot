<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <!-- Local KaTeX CSS (no external CDN) -->
  <link rel="stylesheet" href="../../../assets/katex/katex.min.css">
  
  <style>
    @font-face {
      font-family: "Noto Sans Khmer";
      src: url("../../../assets/fonts/KhmerFont.ttf") format("truetype");
      font-style: normal;
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: "Noto Sans Khmer";
      src: url("../../../assets/fonts/KhmerFontBold.ttf") format("truetype");
      font-style: normal;
      font-weight: 700;
      font-display: block;
    }

    :root {
      --bg-color: #0b132b;
      --card-bg: #1c2541;
      --card-border: rgba(255, 255, 255, 0.12);
      --primary-color: #3b82f6;
      --accent-cyan: #06b6d4;
      --primary-gradient: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --step-bg: rgba(30, 41, 59, 0.7);
      --box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1040px;
      margin: 0 auto;
      background-color: var(--bg-color);
      font-family: "Noto Sans Khmer", "Noto Sans", Arial, sans-serif;
      color: var(--text-main);
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .answer-card {
      box-sizing: border-box;
      width: 990px;
      max-width: 990px;
      min-height: auto;
      height: auto;
      padding: 44px;
      background: linear-gradient(180deg, #1c2541 0%, #0f172a 100%);
      border-radius: 24px;
      box-shadow: var(--box-shadow);
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow: visible;
    }

    /* HEADER SECTION */
    .answer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 24px;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      background: var(--primary-gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(6, 182, 212, 0.35);
    }

    .brand-title .brand-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.3;
    }

    .brand-title .response-type {
      font-size: 14px;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tags span {
      background-color: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    /* HERO & SUMMARY */
    .hero {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px 28px;
      backdrop-filter: blur(10px);
    }

    .hero .eyebrow {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-cyan);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .hero .summary {
      font-size: 22px;
      line-height: 1.8;
      color: #cbd5e1;
    }

    /* STEPPER CONTAINER (FORM A) */
    .answer-steps {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .step-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      column-gap: 20px;
      align-items: stretch;
    }

    .step-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
    }

    .step-marker {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      background: #1e293b;
      color: #38bdf8;
      border-radius: 999px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
    }

    .step-line {
      flex: 1;
      min-height: 36px;
      border-left: 2px dotted rgba(255, 255, 255, 0.35);
      margin-top: 4px;
      margin-bottom: 4px;
    }

    .step-row:last-child .step-line {
      display: none;
    }

    .step-content {
      min-width: 0;
      padding-bottom: 28px;
    }

    .step-card {
      background: var(--step-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .step-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-text {
      font-size: 22px;
      line-height: 1.8;
      color: #e2e8f0;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    /* KEY VALUES GRID */
    .data-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .data-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      min-width: 0;
      width: 100%;
    }

    .data-label {
      font-weight: 700;
      font-size: 20px;
      color: #94a3b8;
      width: 200px;
      flex: 0 0 200px;
    }

    .data-value {
      font-size: 20px;
      color: #f1f5f9;
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    /* CODE PREVIEW */
    .code-block {
      background: #090d16;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 18px 22px;
      font-family: "Courier New", Courier, monospace;
      font-size: 19px;
      line-height: 1.6;
      color: #a7f3d0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* WARNING & RECOMMENDATION */
    .warning-box {
      background: rgba(120, 53, 15, 0.3);
      border: 1px solid rgba(245, 158, 11, 0.4);
      border-radius: 12px;
      padding: 16px 20px;
      color: #fde68a;
    }

    .warning-box h3 {
      font-size: 18px;
      color: #fbbf24;
      margin-bottom: 6px;
    }

    .recommendation-box {
      background: rgba(6, 78, 59, 0.3);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 12px;
      padding: 16px 20px;
      color: #a7f3d0;
    }

    .recommendation-box h3 {
      font-size: 18px;
      color: #34d399;
      margin-bottom: 6px;
    }

    /* MATH PROBLEM */
    .math-display {
      font-size: 22px;
      padding: 10px 0;
      overflow-x: auto;
      color: #38bdf8;
    }

    .final-answer-box {
      margin-top: 12px;
      background: rgba(37, 99, 235, 0.2);
      border: 2px solid var(--primary-color);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    .final-answer-box .label {
      font-size: 14px;
      font-weight: 700;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    /* FOOTER */
    .answer-footer {
      border-top: 1px solid var(--card-border);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 14px;
      width: 100%;
    }
  </style>
</head>
<body>

<main class="answer-card" id="solution-card">
  <!-- HEADER -->
  <header class="answer-header">
    <div class="brand">
      <div class="brand-logo">🤖</div>
      <div class="brand-title">
        <div class="brand-name">{{BOT_NAME}}</div>
        <div class="response-type">{{RESPONSE_TYPE_LABEL}}</div>
      </div>
    </div>
    <div class="tags">
      {{TAGS_HTML}}
    </div>
  </header>

  <!-- HERO TITLE & SUMMARY -->
  <section class="hero">
    <p class="eyebrow">PREMIUM AI RESPONSE</p>
    <h1>{{TITLE}}</h1>
    <p class="summary">{{SUMMARY}}</p>
  </section>

  <!-- STEPPER CONTENT (FORM A VERTICAL STEPPER) -->
  <div class="answer-steps">
    {{STEPPER_HTML}}
  </div>

  <!-- FOOTER -->
  <footer class="answer-footer">
    <div class="footer-left">
      <span>⚡ Generated by {{BOT_NAME}}</span> • 
      <span>{{BOT_USERNAME}}</span>
    </div>
    <div class="footer-right">
      <span>{{GENERATED_AT}}</span>
    </div>
  </footer>
</main>

<script>
  function markReady() {
    window.__RENDER_READY__ = true;
  }
  if (document.readyState === 'complete') {
    markReady();
  } else {
    window.addEventListener('load', () => {
      if (document.fonts) {
        document.fonts.ready.then(markReady).catch(markReady);
      } else {
        markReady();
      }
    });
    setTimeout(markReady, 3000);
  }
</script>
</body>
</html>
